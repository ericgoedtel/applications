---
apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: kinokube-psql
  namespace: kinokube
spec:
  teamId: kinokube
  volume:
    size: 20Gi
  storageClass: nfs-legacy-dynamic
  # nfs shenanigans
  spiloRunAsUser: 65534
  spiloRunAsGroup: 65534
  spiloFSGroup: 65534
  numberOfInstances: 1
  users:
    eric:
      - superuser
      - createdb
    sonarr: []
  databases: # dbname: owner
    sonarr_main: sonarr
    sonarr_logs: sonarr
  postgresql:
    version: "17"
    parameters:
      password_encryption: scram-sha-256
