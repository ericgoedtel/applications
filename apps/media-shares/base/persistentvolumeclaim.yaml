---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-downloads
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 210Gi
  volumeName: nfs-downloads
  storageClassName: nfs-legacy-dynamic
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 15Ti
  volumeName: nfs-media
  storageClassName: nfs-legacy-dynamic
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-kinokube-postgresql
  labels:
    share: postgresql
    project: kinokube
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  volumeName: nfs-kinokube-postgresql
  storageClassName: nfs-legacy-dynamic
